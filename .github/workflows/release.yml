name: Build & Release

# Triggered when you push a version tag, e.g. git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # needed to create a GitHub Release and upload assets

jobs:
  release:
    name: Build DMG and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.0.0
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"   # strip leading 'v'

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          p12-password: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

      - name: Build DMG
        run: bash make-release.sh
        env:
          VERSION: ${{ env.VERSION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}

      - name: Install Sparkle CLI
        run: |
          brew install sparkle

      - name: Generate Appcast
        run: |
          generate_appcast build/ \
            --download-url-prefix https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ \
            --output build/appcast.xml

      - name: Sign Appcast
        run: |
          # The secret should be stored as a complete PEM key (including -----BEGIN/END PRIVATE KEY----- and newlines)
          printf '%s\n' "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_private_key.pem
          sign_update build/appcast.xml \
            --private-key-path /tmp/sparkle_private_key.pem
          rm /tmp/sparkle_private_key.pem
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BetterFinder ${{ github.ref_name }}"
          body: |
            ## Download & Install

            1. Download **BetterFinder-${{ env.VERSION }}.dmg** below
            2. Open the DMG and drag **BetterFinder** into your **Applications** folder
            3. Launch BetterFinder — on first run you will be prompted to grant **Full Disk Access**
               *(System Settings → Privacy & Security → Full Disk Access → add BetterFinder)*
            4. Relaunch the app after granting access

            > **macOS requirement:** macOS 15 Sequoia or later · Apple Silicon (arm64)

            ## What's New

            BetterFinder now includes automatic update checking powered by Sparkle!

            - ✅ Automatic updates every 24 hours
            - ✅ Manual update check in BetterFinder → Check for Updates…
            - ✅ All updates are signed and verified before installation
            - ✅ Configure update behavior in Settings → Updates
          files: |
            build/BetterFinder-${{ env.VERSION }}.dmg
            build/appcast.xml
          draft: false
          prerelease: false
