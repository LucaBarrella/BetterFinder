name: Build & Release

# Triggered when you push a version tag, e.g. git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # needed to create a GitHub Release and upload assets

jobs:
  release:
    name: Build DMG and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.0.0
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"   # strip leading 'v'

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build DMG
        run: bash make-release.sh
        env:
          VERSION: ${{ env.VERSION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BetterFinder ${{ github.ref_name }}"
          body: |
            ## Download & Install

            1. Download **BetterFinder-${{ env.VERSION }}.dmg** below
            2. Open the DMG and drag **BetterFinder** into your **Applications** folder
            3. Launch BetterFinder — on first run you will be prompted to grant **Full Disk Access**
               *(System Settings → Privacy & Security → Full Disk Access → add BetterFinder)*
            4. Relaunch the app after granting access

            > **macOS requirement:** macOS 15 Sequoia or later · Apple Silicon (arm64)
          files: build/BetterFinder-${{ env.VERSION }}.dmg
          draft: false
          prerelease: false
